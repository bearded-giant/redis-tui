services:
  redis-node-1:
    image: redis:7-alpine
    ports:
      - "6380:6380"
      - "16380:16380"
    command: >
      redis-server
        --port 6380
        --cluster-enabled yes
        --cluster-config-file nodes-1.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6380
        --cluster-announce-bus-port 16380
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis-node-2:
    image: redis:7-alpine
    ports:
      - "6381:6381"
      - "16381:16381"
    command: >
      redis-server
        --port 6381
        --cluster-enabled yes
        --cluster-config-file nodes-2.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6381
        --cluster-announce-bus-port 16381
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6381", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis-node-3:
    image: redis:7-alpine
    ports:
      - "6382:6382"
      - "16382:16382"
    command: >
      redis-server
        --port 6382
        --cluster-enabled yes
        --cluster-config-file nodes-3.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6382
        --cluster-announce-bus-port 16382
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis-node-4:
    image: redis:7-alpine
    ports:
      - "6383:6383"
      - "16383:16383"
    command: >
      redis-server
        --port 6383
        --cluster-enabled yes
        --cluster-config-file nodes-4.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6383
        --cluster-announce-bus-port 16383
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6383", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis-node-5:
    image: redis:7-alpine
    ports:
      - "6384:6384"
      - "16384:16384"
    command: >
      redis-server
        --port 6384
        --cluster-enabled yes
        --cluster-config-file nodes-5.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6384
        --cluster-announce-bus-port 16384
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6384", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis-node-6:
    image: redis:7-alpine
    ports:
      - "6385:6385"
      - "16385:16385"
    command: >
      redis-server
        --port 6385
        --cluster-enabled yes
        --cluster-config-file nodes-6.conf
        --cluster-node-timeout 5000
        --cluster-announce-port 6385
        --cluster-announce-bus-port 16385
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6385", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  cluster-init:
    image: redis:7-alpine
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Redis cluster..."
        redis-cli --cluster create \
          redis-node-1:6380 \
          redis-node-2:6381 \
          redis-node-3:6382 \
          redis-node-4:6383 \
          redis-node-5:6384 \
          redis-node-6:6385 \
          --cluster-replicas 1 --cluster-yes
        echo "Cluster created."
