name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Enforce 100% coverage
        run: |
          go tool cover -func=coverage.out | while IFS= read -r line; do
            pkg=$(echo "$line" | awk '{print $1}')
            func=$(echo "$line" | awk '{print $2}')
            pct=$(echo "$line" | awk '{print $NF}' | tr -d '%')
            if [ "$func" = "(statements)" ] && [ "$pkg" != "total:" ]; then
              if [ "$(echo "$pct < 100.0" | bc -l)" = "1" ]; then
                echo "FAIL: $pkg coverage is ${pct}%, required 100%"
                exit 1
              fi
            fi
          done
          echo "All packages at 100% coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          binary_name="redis-tui"
          if [ "$GOOS" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          go build -ldflags "-s -w" -o "bin/${binary_name}" ./

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: redis-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
